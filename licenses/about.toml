# Configuration for cargo-about
# This generates the THIRD-PARTY-LICENSES file for distribution

# Use accepted licenses from common open-source projects
accepted = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "0BSD",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "CC0-1.0",
    "Zlib",
    "NCSA",
    "CDLA-Permissive-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Unlicense",
    "GPL-2.0-only",
    "GPL-3.0-or-later", #temporary until GPUI is cleaned
]

# Filter out certain crates (e.g., your own workspace crates)
filter-noassertion = true

# openssl-src bundles the entire OpenSSL C source tree (~8000 files), some of which
# carry legacy GPL-1.0/GPL-2.0 notices in Perl scripts and assembly files.
# The crate itself is Apache-2.0 OR MIT; clarify so cargo-about uses only the
# root license files and skips scanning the bundled OpenSSL source.
[openssl-src.clarify]
license = "Apache-2.0 OR MIT"

[[openssl-src.clarify.files]]
path = "LICENSE-APACHE"
license = "Apache-2.0"
checksum = "a60eea817514531668d7e00765731449fe14d059d3249e0bc93b36de45f759f2"

[[openssl-src.clarify.files]]
path = "LICENSE-MIT"
license = "MIT"
checksum = "378f5840b258e2779c39418f3f2d7b2ba96f1c7917dd6be0713f88305dbda397"

# Zed repo crates: Cargo.toml says GPL-3.0-or-later, but the LICENSE-GPL file
# text is detected as the deprecated identifier GPL-3.0 by cargo-about's scanner.
# Clarify each crate so cargo-about uses GPL-3.0-or-later as the expression.
[zlog.clarify]
license = "GPL-3.0-or-later"

[[zlog.clarify.files]]
path = "LICENSE-GPL"
license = "GPL-3.0-or-later"
checksum = "0aa0322ea494da441088e4d9144c6720bf99d9e2e1eefcd29d1f58b19b5c4246"

[ztracing.clarify]
license = "GPL-3.0-or-later"

[[ztracing.clarify.files]]
path = "LICENSE-GPL"
license = "GPL-3.0-or-later"
checksum = "0aa0322ea494da441088e4d9144c6720bf99d9e2e1eefcd29d1f58b19b5c4246"

[ztracing_macro.clarify]
license = "GPL-3.0-or-later"

[[ztracing_macro.clarify.files]]
path = "LICENSE-GPL"
license = "GPL-3.0-or-later"
checksum = "0aa0322ea494da441088e4d9144c6720bf99d9e2e1eefcd29d1f58b19b5c4246"

# self_cell: Cargo.toml says Apache-2.0 OR GPL-2.0-only, but the LICENSE-GPLv2
# file is detected as the deprecated GPL-2.0 identifier by cargo-about's scanner.
[self_cell.clarify]
