name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  ACTOR: ${{ github.actor }}
  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
  REPOSITORY: ${{ github.repository }}

jobs:
  validate:
    name: Validate Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract and validate version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Tag version: $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT

  test:
    name: Test - ${{ matrix.os }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: &linux_deps |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            pkg-config \
            libssl-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.os }}-cargo

      - name: Check build
        run: cargo check --all-features --quiet

      - name: Run tests
        run: cargo test --all-features

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

  build:
    name: Build - ${{ matrix.name }}
    needs: [validate, test]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel
            runner: macos-13
            platform: macos
            arch: x86_64
            formats: dmg
          - name: macOS Apple Silicon
            runner: macos-latest
            platform: macos
            arch: aarch64
            formats: dmg
          - name: Windows x86_64
            runner: windows-latest
            platform: windows
            arch: x86_64
            formats: nsis
          - name: Linux x86_64
            runner: ubuntu-22.04
            platform: linux
            arch: x86_64
            formats: deb,appimage
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            platform: linux
            arch: aarch64
            formats: deb,appimage

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: *linux_deps

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.runner }}

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Install cargo-about
        run: cargo install cargo-about --locked

      - name: Generate third-party licenses
        run: cargo about generate licenses/about.hbs -c licenses/about.toml --workspace -o THIRD-PARTY-LICENSES

      - name: Build and package
        env:
          FORMATS: ${{ matrix.formats }}
        run: cargo packager --release --formats $FORMATS

      - name: Rename artifacts and compute checksums (Unix)
        if: runner.os != 'Windows'
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p artifacts

          # Use sha256sum on Linux, shasum on macOS
          checksum_cmd() { if command -v sha256sum &>/dev/null; then sha256sum "$1"; else shasum -a 256 "$1"; fi; }

          if [ "$PLATFORM" = "macos" ]; then
            DMG=$(find . -maxdepth 3 -name "*.dmg" -not -path "./artifacts/*" | head -1)
            if [ -n "$DMG" ]; then
              DEST="artifacts/Fulgur-v${VERSION}-macos-${ARCH}.dmg"
              mv "$DMG" "$DEST"
              checksum_cmd "$DEST" > "${DEST}.sha256"
            fi
          elif [ "$PLATFORM" = "linux" ]; then
            DEB=$(find . -maxdepth 3 -name "*.deb" -not -path "./artifacts/*" | head -1)
            if [ -n "$DEB" ]; then
              DEST="artifacts/Fulgur-v${VERSION}-linux-${ARCH}.deb"
              mv "$DEB" "$DEST"
              checksum_cmd "$DEST" > "${DEST}.sha256"
            fi

            APPIMAGE=$(find . -maxdepth 3 -name "*.AppImage" -not -path "./artifacts/*" | head -1)
            if [ -n "$APPIMAGE" ]; then
              DEST="artifacts/Fulgur-v${VERSION}-linux-${ARCH}.AppImage"
              mv "$APPIMAGE" "$DEST"
              checksum_cmd "$DEST" > "${DEST}.sha256"
            fi
          fi

          echo "Artifacts:"
          ls -la artifacts/

      - name: Rename artifacts and compute checksums (Windows)
        if: runner.os == 'Windows'
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts

          # Search for NSIS installer (typically *-setup.exe or *_x64-setup.exe)
          $exe = Get-ChildItem -Path . -Recurse -Depth 3 -Filter "*setup*.exe" |
            Where-Object { $_.DirectoryName -notmatch "artifacts" } |
            Select-Object -First 1

          if (-not $exe) {
            # Fallback: any .exe in nsis-related directory
            $exe = Get-ChildItem -Path . -Recurse -Depth 3 -Filter "*.exe" |
              Where-Object { $_.DirectoryName -match "nsis" } |
              Select-Object -First 1
          }

          if ($exe) {
            $dest = "artifacts/Fulgur-v${env:VERSION}-windows-x86_64-setup.exe"
            Move-Item $exe.FullName $dest
            $hash = (Get-FileHash $dest -Algorithm SHA256).Hash.ToLower()
            $relativeName = Split-Path $dest -Leaf
            "$hash  $relativeName" | Out-File -Encoding utf8NoBOM "${dest}.sha256"
          } else {
            Write-Error "No installer executable found"
            exit 1
          }

          Write-Host "Artifacts:"
          Get-ChildItem artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Create Release
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.validate.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS.txt
        working-directory: release-artifacts
        run: |
          cat *.sha256 | sort > SHA256SUMS.txt
          rm -f *.sha256
          echo "SHA256SUMS.txt contents:"
          cat SHA256SUMS.txt
          echo ""
          echo "All release artifacts:"
          ls -la

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${VERSION}" \
            --draft \
            --title "Fulgur v${VERSION}" \
            --generate-notes \
            release-artifacts/*

      - name: Telegram notification - Success
        if: success()
        run: |
          ARTIFACT_COUNT=$(ls release-artifacts/ | wc -l)

          MESSAGE="📦 *Fulgur Release v${VERSION} - Draft Created*

          All platform builds completed successfully
          Artifacts: ${ARTIFACT_COUNT} files (macOS, Windows, Linux)

          *Tag:* \`v${VERSION}\`
          *Author:* ${ACTOR}

          [View Release](https://github.com/${REPOSITORY}/releases/tag/v${VERSION})
          [View Run](${RUN_URL})"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"text\": \"${MESSAGE}\",
              \"parse_mode\": \"Markdown\",
              \"disable_web_page_preview\": true
            }"

      - name: Telegram notification - Failure
        if: failure()
        run: |
          MESSAGE="❌ *Fulgur Release v${VERSION} - Failed*

          Release workflow failed

          *Tag:* \`v${VERSION}\`
          *Author:* ${ACTOR}

          [View Run](${RUN_URL})"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"text\": \"${MESSAGE}\",
              \"parse_mode\": \"Markdown\",
              \"disable_web_page_preview\": true
            }"
