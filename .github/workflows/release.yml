name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  ACTOR: ${{ github.actor }}
  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
  REPOSITORY: ${{ github.repository }}

jobs:
  validate:
    name: Validate Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract and validate version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Tag version: $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT

  build:
    name: Build - ${{ matrix.name }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            runner: macos-latest
            platform: macos
            arch: aarch64
            formats: dmg
          - name: Windows x86_64
            runner: windows-latest
            platform: windows
            arch: x86_64
            formats: nsis
          - name: Linux x86_64
            runner: ubuntu-22.04
            platform: linux
            arch: x86_64
            formats: deb,appimage
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            platform: linux
            arch: aarch64
            formats: deb,appimage

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mold \
            libdbus-1-dev \
            pkg-config \
            libssl-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      # ssh2 vendored-openssl requires NASM and Perl to compile OpenSSL from source on Windows.
      # We pin OPENSSL_SRC_PERL to the runner's pre-installed Strawberry Perl because Git Bash's
      # MSYS2 perl resolves first on PATH and is missing modules like Locale::Maketext::Simple.
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Pin OpenSSL build to Strawberry Perl (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "OPENSSL_SRC_PERL=C:\Strawberry\perl\bin\perl.exe" >> $env:GITHUB_ENV

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.runner }}

      # -- Test phase --
      # cargo check, clippy, and fmt already run on every merge to main via ci.yml,
      # so we skip them here and only re-run tests against the release commit.

      - name: Run tests
        run: cargo test --all-features

      # -- Package phase --

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-packager
        run: cargo binstall cargo-packager --locked --no-confirm --force

      - name: Install cargo-about
        run: cargo binstall cargo-about --locked --no-confirm --force

      - name: Generate third-party licenses
        run: cargo about generate licenses/about.hbs -c licenses/about.toml --workspace -o THIRD-PARTY-LICENSES || true

      - name: Import Apple signing certificate
        if: matrix.platform == 'macos'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12

          KEYCHAIN_PASSWORD=$(openssl rand -hex 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 21600 -u build.keychain

          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

          rm certificate.p12
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Build and package
        shell: bash
        env:
          FORMATS: ${{ matrix.formats }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos' && secrets.APPLE_SIGNING_IDENTITY || '' }}
        run: cargo packager --release --formats $FORMATS

      - name: Re-sign app with hardened runtime
        if: matrix.platform == 'macos'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          DMG=$(find . -maxdepth 3 -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then
            echo "::error::No DMG file found"
            exit 1
          fi
          echo "Found DMG: $DMG"

          # Mount the DMG to access the .app
          MOUNT_DIR=$(mktemp -d)
          hdiutil attach "$DMG" -mountpoint "$MOUNT_DIR" -nobrowse

          # Copy .app out (DMG is read-only)
          APP=$(find "$MOUNT_DIR" -maxdepth 1 -name "*.app" | head -1)
          if [ -z "$APP" ]; then
            echo "::error::No .app found inside DMG"
            hdiutil detach "$MOUNT_DIR"
            exit 1
          fi
          APP_NAME=$(basename "$APP")
          WORK_DIR=$(mktemp -d)
          cp -R "$APP" "$WORK_DIR/$APP_NAME"
          hdiutil detach "$MOUNT_DIR"

          # Sign all nested binaries, dylibs, and frameworks first (deep signing)
          find "$WORK_DIR/$APP_NAME" -type f \( -name "*.dylib" -o -name "*.so" -o -perm +111 \) | while read -r binary; do
            # Skip non-Mach-O files
            if file "$binary" | grep -q "Mach-O"; then
              echo "Signing: $binary"
              codesign --force --sign "$APPLE_SIGNING_IDENTITY" \
                --options runtime \
                --timestamp \
                "$binary"
            fi
          done

          # Sign the .app bundle itself with hardened runtime + entitlements
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" \
            --options runtime \
            --timestamp \
            --entitlements entitlements.plist \
            "$WORK_DIR/$APP_NAME"

          # Verify the signature
          echo "Verifying signature..."
          codesign --verify --deep --strict --verbose=2 "$WORK_DIR/$APP_NAME"
          spctl --assess --type execute --verbose=2 "$WORK_DIR/$APP_NAME" || echo "::warning::spctl assessment failed (expected before notarization)"

          # Add Applications symlink for drag-and-drop installation
          ln -s /Applications "$WORK_DIR/Applications"

          # Recreate the DMG with the re-signed app
          rm "$DMG"
          hdiutil create -volname "Fulgur" -srcfolder "$WORK_DIR" -ov -format UDZO "$DMG"

          # Sign the DMG envelope
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" --timestamp "$DMG"

          # Clean up
          rm -rf "$MOUNT_DIR" "$WORK_DIR"
          echo "Re-signing complete"

      - name: Notarize macOS DMG
        if: matrix.platform == 'macos'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG=$(find . -maxdepth 3 -name "*.dmg" | head -1)
          echo "Submitting for notarization: $DMG"

          # Submit for notarization, capture output for submission ID
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 300 2>&1) || true

          echo "$SUBMIT_OUTPUT"

          # Extract submission ID
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep -m1 "id:" | awk '{print $2}')
          echo "Submission ID: $SUBMISSION_ID"

          # Check if notarization succeeded
          if echo "$SUBMIT_OUTPUT" | grep -q "status: Accepted"; then
            echo "Notarization accepted"
          else
            echo "::error::Notarization failed. Fetching detailed log..."

            # Fetch the notarization log for diagnosis
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_ID_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" \
                notarization-log.json || true

              echo "--- Notarization Log ---"
              cat notarization-log.json 2>/dev/null || echo "Could not retrieve log"
              echo "--- End Log ---"
            fi

            exit 1
          fi

          # Staple the notarization ticket to the DMG
          xcrun stapler staple "$DMG"

          echo "Notarization and stapling complete"

      - name: Clean up macOS keychain
        if: matrix.platform == 'macos' && always()
        run: |
          security default-keychain -s login.keychain || true
          security delete-keychain build.keychain || true

      - name: Rename artifacts and compute checksums (Unix)
        if: runner.os != 'Windows'
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p artifacts

          # Use sha256sum on Linux, shasum on macOS
          checksum_cmd() { if command -v sha256sum &>/dev/null; then sha256sum "$1"; else shasum -a 256 "$1"; fi; }

          if [ "$PLATFORM" = "macos" ]; then
            DMG=$(find . -maxdepth 3 -name "*.dmg" -not -path "./artifacts/*" | head -1)
            if [ -n "$DMG" ]; then
              DEST="artifacts/Fulgur-v${VERSION}-macos-${ARCH}.dmg"
              mv "$DMG" "$DEST"
              checksum_cmd "$DEST" > "${DEST}.sha256"
            fi
          elif [ "$PLATFORM" = "linux" ]; then
            DEB=$(find . -maxdepth 3 -name "*.deb" -not -path "./artifacts/*" | head -1)
            if [ -n "$DEB" ]; then
              DEST="artifacts/Fulgur-v${VERSION}-linux-${ARCH}.deb"
              mv "$DEB" "$DEST"
              checksum_cmd "$DEST" > "${DEST}.sha256"
            fi

            APPIMAGE=$(find . -maxdepth 3 -name "*.AppImage" -not -path "./artifacts/*" | head -1)
            if [ -n "$APPIMAGE" ]; then
              DEST="artifacts/Fulgur-v${VERSION}-linux-${ARCH}.AppImage"
              mv "$APPIMAGE" "$DEST"
              checksum_cmd "$DEST" > "${DEST}.sha256"
            fi
          fi

          echo "Artifacts:"
          ls -la artifacts/

      - name: Rename artifacts and compute checksums (Windows)
        if: runner.os == 'Windows'
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts

          # Search for NSIS installer (typically *-setup.exe or *_x64-setup.exe)
          $exe = Get-ChildItem -Path . -Recurse -Depth 3 -Filter "*setup*.exe" |
            Where-Object { $_.DirectoryName -notmatch "artifacts" } |
            Select-Object -First 1

          if (-not $exe) {
            # Fallback: any .exe in nsis-related directory
            $exe = Get-ChildItem -Path . -Recurse -Depth 3 -Filter "*.exe" |
              Where-Object { $_.DirectoryName -match "nsis" } |
              Select-Object -First 1
          }

          if ($exe) {
            $dest = "artifacts/Fulgur-v${env:VERSION}-windows-x86_64-setup.exe"
            Move-Item $exe.FullName $dest
            $hash = (Get-FileHash $dest -Algorithm SHA256).Hash.ToLower()
            $relativeName = Split-Path $dest -Leaf
            "$hash  $relativeName" | Out-File -Encoding utf8NoBOM "${dest}.sha256"
          } else {
            Write-Error "No installer executable found"
            exit 1
          }

          Write-Host "Artifacts:"
          Get-ChildItem artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Create Release
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.validate.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS.txt
        working-directory: release-artifacts
        run: |
          cat *.sha256 | sort > SHA256SUMS.txt
          rm -f *.sha256
          echo "SHA256SUMS.txt contents:"
          cat SHA256SUMS.txt
          echo ""
          echo "All release artifacts:"
          ls -la

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${VERSION}" \
            --draft \
            --title "Fulgur v${VERSION}" \
            --generate-notes \
            release-artifacts/*

      - name: Telegram notification - Success
        if: success()
        run: |
          ARTIFACT_COUNT=$(ls release-artifacts/ | wc -l)
          COMMIT_MSG=$(git log --format=%s -1 | tr '`' "'" | head -c 80)

          MESSAGE="📦 *Fulgur Release v${VERSION} - Draft Created*

          All platform builds completed successfully
          Artifacts: ${ARTIFACT_COUNT} files (macOS, Windows, Linux)

          *Tag:* \`v${VERSION}\`
          *Commit:* \`${COMMIT_SHA:0:7}\` - ${COMMIT_MSG}
          *Author:* ${ACTOR}

          [View Release](https://github.com/${REPOSITORY}/releases/tag/v${VERSION})
          [View Run](${RUN_URL})"

          jq -n --arg chat_id "$TELEGRAM_CHAT_ID" --arg text "$MESSAGE" \
            '{chat_id: $chat_id, text: $text, parse_mode: "Markdown", disable_web_page_preview: true}' |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" -d @-

      - name: Telegram notification - Failure
        if: failure()
        run: |
          COMMIT_MSG=$(git log --format=%s -1 | tr '`' "'" | head -c 80)

          MESSAGE="❌ *Fulgur Release v${VERSION} - Failed*

          Release workflow failed

          *Tag:* \`v${VERSION}\`
          *Commit:* \`${COMMIT_SHA:0:7}\` - ${COMMIT_MSG}
          *Author:* ${ACTOR}

          [View Run](${RUN_URL})"

          jq -n --arg chat_id "$TELEGRAM_CHAT_ID" --arg text "$MESSAGE" \
            '{chat_id: $chat_id, text: $text, parse_mode: "Markdown", disable_web_page_preview: true}' |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" -d @-
