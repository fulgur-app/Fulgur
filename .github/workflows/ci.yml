  # E: Merged docs + unsafe-audit into one job (saves runner provisioning + dep install + compilation)
  docs-and-audit:
    name: Docs & Safety
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: *linux_deps_install_cmd

      # C: Shared cache with other Ubuntu jobs
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-latest-cargo

      - name: Build documentation
        id: docs
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: '-D warnings'

      - name: Install cargo-geiger
        if: '!cancelled()'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-geiger

      - name: Run cargo-geiger
        id: geiger
        if: '!cancelled()'
        run: |
          OUTPUT=$(cargo geiger --output-format GitHubMarkdown || true)
          echo "$OUTPUT"
          echo "$OUTPUT" > geiger-report.md

          # Extract unsafe statistics from first-party code (fulgur crate)
          UNSAFE_COUNT=$(echo "$OUTPUT" | grep "^| fulgur " | awk -F'|' '{print $6}' | tr -d ' ' || echo "0")
          echo "unsafe_count=$UNSAFE_COUNT" >> $GITHUB_OUTPUT

      - name: Telegram notification
        if: '!cancelled()'
        env:
          JOB_STATUS: ${{ job.status }}
          DOCS_OUTCOME: ${{ steps.docs.outcome }}
          UNSAFE_COUNT: ${{ steps.geiger.outputs.unsafe_count }}
        run: |
          if [ "$DOCS_OUTCOME" = "success" ]; then
            DOCS_LINE="Documentation built successfully"
          else
            DOCS_LINE="Documentation build failed"
          fi

          if [ -n "$UNSAFE_COUNT" ]; then
            SAFETY_LINE="Unsafe expressions in first-party code: *${UNSAFE_COUNT}*"
          else
            SAFETY_LINE="Unsafe code audit failed"
          fi

          if [ "$JOB_STATUS" = "success" ]; then
            ICON="✅"
            TITLE="Fulgur Docs & Safety - Passed"
          else
            ICON="❌"
            TITLE="Fulgur Docs & Safety - Issues Found"
          fi

          MESSAGE="${ICON} *${TITLE}*

          ${DOCS_LINE}
          ${SAFETY_LINE}

          *Branch:* \`${BRANCH}\`
          *Commit:* \`${COMMIT_SHA}\`
          *Author:* ${ACTOR}

          [View Run](${RUN_URL})"

          curl -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"text\": \"${MESSAGE}\",
              \"parse_mode\": \"Markdown\",
              \"disable_web_page_preview\": true
            }"
